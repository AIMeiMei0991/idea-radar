name: 每日抓取工具创意

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 00:00 UTC = 北京时间 08:00
  workflow_dispatch:        # 允许手动触发
  push:
    branches: [main]        # 推送时也触发一次（初始化数据）

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许写入仓库

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行抓取脚本
        run: node scripts/scrape.js

      - name: 提交数据更新
        run: |
          git config user.name "IdeaRadar Bot"
          git config user.email "bot@idea-radar.com"
          git add public/data/ideas.json
          git diff --staged --quiet || git commit -m "data: 自动更新创意数据 $(date '+%Y-%m-%d')"
          git push
