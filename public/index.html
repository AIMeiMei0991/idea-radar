<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="每天自动抓取全球最新数字工具创意，筛选中国市场机会">
<title>创意雷达 · 每日工具创意</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#e2e2e2;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;min-height:100vh}

/* ── 顶栏 ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.logo-icon{color:#ff6b35;margin-right:5px}
.update-time{font-size:11px;color:#444;margin-top:2px}
.bookmark-count{font-size:11px;color:#6366f1;background:rgba(99,102,241,0.12);padding:2px 8px;border-radius:10px;font-weight:600}

/* 搜索 */
.search-wrap{padding:0 12px 8px;position:relative}
.search-input{width:100%;background:#141420;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 14px;font-size:16px;color:#e2e2e2;outline:none;-webkit-appearance:none}
.search-input::placeholder{color:#3a3a4a}
.search-input:focus{border-color:rgba(255,107,53,0.4);background:#18181f}
.search-clear{position:absolute;right:24px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:4px;display:none}
.search-clear.visible{display:block}

/* 标签页 */
.tabs-wrap{display:flex;gap:0;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;font-size:13px;font-weight:500;padding:7px 14px;border-radius:10px;background:none;border:none;color:#555;cursor:pointer;transition:all 0.15s;white-space:nowrap;position:relative}
.tab-btn.active{background:#1c1c28;color:#e2e2e2;font-weight:600}
.tab-btn .badge{position:absolute;top:4px;right:6px;background:#6366f1;color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:6px;min-width:14px;text-align:center;line-height:1.4}

/* 筛选标签 */
.filters-wrap{position:relative;display:none}
.filters-wrap.visible{display:block}
.filters{display:flex;gap:7px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters-fade{position:absolute;right:0;top:0;bottom:10px;width:40px;background:linear-gradient(to right,transparent,rgba(10,10,15,0.97));pointer-events:none}
.filter-btn{flex-shrink:0;font-size:12px;padding:6px 13px;border-radius:20px;background:#141420;border:1px solid rgba(255,255,255,0.07);color:#555;cursor:pointer;transition:all 0.15s;white-space:nowrap;-webkit-appearance:none}
.filter-btn.active{background:#fff;color:#0a0a0f;font-weight:600;border-color:transparent}
.filter-sep{width:1px;background:rgba(255,255,255,0.07);flex-shrink:0;margin:0 2px;align-self:stretch}

/* ── 날짜 섹션 ── */
.section-header{display:flex;align-items:center;gap:8px;padding:14px 16px 10px}
.date-label{font-size:12px;font-weight:600;color:#888;letter-spacing:0.2px}
.date-count{font-size:11px;color:#3a3a4a}
.date-line{flex:1;height:1px;background:rgba(255,255,255,0.05)}

/* ── 카드 ── */
.cards{padding:0 12px;display:flex;flex-direction:column;gap:10px}
.card-wrap{position:relative}
.card{border-radius:16px;padding:14px 14px 12px;border:1px solid;text-decoration:none;display:block;transition:transform 0.1s,opacity 0.1s}
.card:active{transform:scale(0.985);opacity:0.9}
.card.s5{background:linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,107,53,0.04));border-color:rgba(255,107,53,0.28)}
.card.s4{background:rgba(255,107,53,0.06);border-color:rgba(255,107,53,0.16)}
.card.s3{background:rgba(251,191,36,0.04);border-color:rgba(251,191,36,0.14)}
.card.s2,.card.s1{background:rgba(255,255,255,0.015);border-color:rgba(255,255,255,0.06)}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.source-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-ph{background:#ff6154}
.dot-tmrr{background:#22c55e}
.dot-ih{background:#818cf8}
.dot-hn{background:#ff6600}
.src-name{font-size:11px;color:#555}
.cat-tag{font-size:11px;color:#444;background:rgba(255,255,255,0.05);padding:2px 7px;border-radius:6px}

.score-bar{display:flex;gap:3px;align-items:center}
.sdot{width:5px;height:5px;border-radius:50%}
.sdot.on-5{background:#ff6b35}
.sdot.on-4{background:#fb923c}
.sdot.on-3{background:#fbbf24}
.sdot.on-2,.sdot.on-1{background:#6366f1}
.sdot.off{background:#1e1e2a}

.card-title{font-size:15px;font-weight:600;color:#f0f0f4;line-height:1.35;margin-bottom:6px;padding-right:32px}
.mrr{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,0.12);color:#4ade80;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:8px;letter-spacing:0.2px}
.summary{font-size:13px;color:#9090a0;line-height:1.65;margin-bottom:8px}
.opp-box{display:flex;gap:8px;background:rgba(99,102,241,0.08);border-radius:10px;padding:10px 12px;margin-bottom:0}
.opp-icon{font-size:12px;flex-shrink:0;margin-top:2px}
.opp-text{font-size:12px;color:#a5b4fc;line-height:1.55}
.score-reason{font-size:11px;color:#3a3a4a;margin-top:8px;letter-spacing:0.1px}

/* 收藏按钮 */
.bookmark-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:17px;line-height:1;padding:4px;color:#333;transition:all 0.15s;z-index:5}
.bookmark-btn.bookmarked{color:#fbbf24}
.bookmark-btn:active{transform:scale(1.3)}

/* 收藏空状态 */
.bookmark-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:#444;font-size:14px;text-align:center;padding:20px}
.bookmark-empty-icon{font-size:40px;margin-bottom:4px}
.bookmark-empty-sub{font-size:12px;color:#333;margin-top:2px;line-height:1.6}

/* ── 토스트 ── */
.toast{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e2c;border:1px solid rgba(255,255,255,0.1);color:#e2e2e2;font-size:13px;padding:10px 20px;border-radius:24px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:#2a1010;border-color:rgba(239,68,68,0.3);color:#fca5a5}
.toast.success{background:#0f2a1a;border-color:rgba(34,197,94,0.3);color:#86efac}

/* ── 상태 ── */
.loading,.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:12px;color:#444;font-size:14px;text-align:center;padding:20px}
.empty-icon{font-size:36px;margin-bottom:4px}
.empty-sub{font-size:12px;color:#333;margin-top:2px}
.empty-action{font-size:12px;color:#6366f1;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);padding:7px 16px;border-radius:20px;cursor:pointer;margin-top:8px}
.spinner{width:28px;height:28px;border:2px solid #1e1e28;border-top-color:#ff6b35;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 통계 ── */
.stats{padding:6px 16px 2px;font-size:12px;color:#3a3a4a}
.stats b{color:#555;font-weight:500}

/* ── 페이지네이션 ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:20px 16px 12px}
.page-btn{font-size:13px;padding:8px 20px;background:#141420;border:1px solid rgba(255,255,255,0.08);color:#777;border-radius:12px;cursor:pointer}
.page-btn:disabled{opacity:0.25;cursor:default}
.page-info{font-size:12px;color:#444}

/* ── 푸터 ── */
.footer{text-align:center;font-size:11px;color:#2a2a38;padding:20px 16px calc(16px + env(safe-area-inset-bottom,0px))}

/* ── 바텀 오프셋 ── */
.bottom-space{height:calc(20px + env(safe-area-inset-bottom,0px))}

/* HN分数徽章 */
.hn-score{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#888;margin-left:4px}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-inner">
    <div>
      <div class="logo"><span class="logo-icon">📡</span>创意雷达</div>
      <div class="update-time" id="updateTime">每天 08:00 自动更新</div>
    </div>
    <span class="bookmark-count" id="bookmarkCount" style="display:none"></span>
  </div>
  <div class="search-wrap" id="searchWrap">
    <input class="search-input" type="search" id="searchInput"
      placeholder="搜索，如：AI视频、营销、SaaS…"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="清除搜索">✕</button>
  </div>
  <div class="tabs-wrap" id="tabsWrap">
    <button class="tab-btn active" data-tab="feed" onclick="setTab(this,'feed')">📰 今日精选</button>
    <button class="tab-btn" data-tab="all" onclick="setTab(this,'all')">全部</button>
    <button class="tab-btn" data-tab="ph" onclick="setTab(this,'ph')">PH 新品</button>
    <button class="tab-btn" data-tab="tmrr" onclick="setTab(this,'tmrr')">验证收入</button>
    <button class="tab-btn" data-tab="ih" onclick="setTab(this,'ih')">独立创业</button>
    <button class="tab-btn" data-tab="hn" onclick="setTab(this,'hn')">HN 精选</button>
    <button class="tab-btn" data-tab="bookmarks" onclick="setTab(this,'bookmarks')">🔖 收藏 <span class="badge" id="bkBadge" style="display:none">0</span></button>
  </div>
</div>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ── 状态 ───────────────────────────────────────────────
let allData = [];
let activeTab = 'feed'; // feed=高价值精选, all=全部, ph/tmrr/ih/hn=来源, bookmarks=收藏
let searchQ = '';
let currentPage = 1;
const PAGE_SIZE = 30;
let searchTimer = null;
let bookmarks = new Set();

// ── 本地收藏（localStorage）──────────────────────────
function loadBookmarks() {
  try {
    const raw = localStorage.getItem('idea-radar-bookmarks');
    if (raw) bookmarks = new Set(JSON.parse(raw));
  } catch(_) {}
}

function saveBookmarks() {
  try { localStorage.setItem('idea-radar-bookmarks', JSON.stringify([...bookmarks])); } catch(_) {}
}

function toggleBookmark(id, event) {
  event.preventDefault();
  event.stopPropagation();
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    showToast('已取消收藏', '');
  } else {
    bookmarks.add(id);
    showToast('已收藏 🔖', 'success');
  }
  saveBookmarks();
  updateBookmarkUI();
  // 只更新这一张卡片的按钮状态，不重新渲染整页
  const btn = document.querySelector(`[data-bk-id="${CSS.escape(id)}"]`);
  if (btn) {
    btn.textContent = bookmarks.has(id) ? '🔖' : '🏷️';
    btn.classList.toggle('bookmarked', bookmarks.has(id));
    btn.setAttribute('aria-label', bookmarks.has(id) ? '取消收藏' : '收藏');
  }
  // 如果当前在收藏tab，重新渲染
  if (activeTab === 'bookmarks') filterAndRender();
}

function updateBookmarkUI() {
  const count = bookmarks.size;
  const countEl = document.getElementById('bookmarkCount');
  const badge = document.getElementById('bkBadge');
  if (count > 0) {
    countEl.textContent = `${count} 收藏`;
    countEl.style.display = '';
    badge.textContent = count;
    badge.style.display = '';
  } else {
    countEl.style.display = 'none';
    badge.style.display = 'none';
  }
}

// ── 工具函数 ──────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

function fmtDate(dateKey) {
  const d = new Date(dateKey + 'T12:00:00');
  return d.toLocaleDateString('zh-CN', {month:'long', day:'numeric', weekday:'short'});
}

function fixTitle(t) {
  return t
    .replace(/\bAi\b/g,'AI').replace(/\bSaas\b/g,'SaaS').replace(/\bMrr\b/g,'MRR')
    .replace(/\bArr\b/g,'ARR').replace(/\bSeo\b/g,'SEO').replace(/\bApi\b/g,'API')
    .replace(/\bCrm\b/g,'CRM').replace(/\bUgc\b/g,'UGC').replace(/\bB2b\b/g,'B2B')
    .replace(/\bB2c\b/g,'B2C').replace(/\bErp\b/g,'ERP').replace(/\bUi\b/g,'UI')
    .replace(/\bUx\b/g,'UX');
}

function scoreClass(s) { return 's' + Math.max(1, Math.min(5, s)); }

function scoreDots(score, max=5) {
  return Array.from({length:max}, (_,i) => {
    const lvl = i < score ? 'on-' + score : 'off';
    return `<div class="sdot ${lvl}" aria-hidden="true"></div>`;
  }).join('');
}

function dotClass(src) {
  if (src === 'producthunt') return 'dot-ph';
  if (src === 'trustmrr') return 'dot-tmrr';
  if (src === 'hackernews') return 'dot-hn';
  return 'dot-ih';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 加载数据 ───────────────────────────────────────────
async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中…</p></div>';
  try {
    const res = await fetch('./data/ideas.json?' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();
    if (!Array.isArray(allData)) throw new Error('数据格式错误');

    if (allData.length > 0) {
      const latest = allData.reduce((a,b) => a.fetchedAt > b.fetchedAt ? a : b);
      const d = new Date(latest.fetchedAt);
      document.getElementById('updateTime').textContent =
        '最后更新：' + d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'}) + ' ' +
        d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    }
    filterAndRender();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <p>加载失败</p>
        <p class="empty-sub">${e.message}</p>
        <button class="empty-action" onclick="loadData()">重新加载</button>
      </div>`;
  }
}

// ── 筛选 & 渲染 ────────────────────────────────────────
function filterAndRender() {
  // 收藏标签页
  if (activeTab === 'bookmarks') {
    renderBookmarks();
    return;
  }

  let items = [...allData];

  // 来源筛选
  const srcMap = {ph:'producthunt', tmrr:'trustmrr', ih:'indiehackers', hn:'hackernews'};
  if (srcMap[activeTab]) items = items.filter(i => i.source === srcMap[activeTab]);

  // 精选：默认显示 score ≥ 3
  if (activeTab === 'feed') items = items.filter(i => (i.score||0) >= 3);

  // 搜索
  if (searchQ) {
    const q = searchQ.toLowerCase();
    items = items.filter(i =>
      fixTitle(i.title||'').toLowerCase().includes(q) ||
      (i.summary||'').toLowerCase().includes(q) ||
      (i.opportunity||'').toLowerCase().includes(q) ||
      (i.category||'').toLowerCase().includes(q)
    );
  }

  // 排序：日期降序，同日按评分降序
  items.sort((a,b) => {
    const dd = (b.dateKey||'').localeCompare(a.dateKey||'');
    return dd !== 0 ? dd : (b.score||0) - (a.score||0);
  });

  const total = items.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const paged = items.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  const grouped = {};
  for (const item of paged) {
    const k = item.dateKey || '未知日期';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(item);
  }

  renderView(grouped, total, totalPages);
}

function renderBookmarks() {
  const app = document.getElementById('app');
  if (bookmarks.size === 0) {
    app.innerHTML = `
      <div class="bookmark-empty">
        <div class="bookmark-empty-icon">🔖</div>
        <p>还没有收藏</p>
        <p class="bookmark-empty-sub">浏览创意时点击卡片上的 🏷️<br>就能收藏，随时回来看</p>
      </div>`;
    return;
  }

  const items = allData.filter(i => bookmarks.has(i.id));
  items.sort((a,b) => (b.score||0) - (a.score||0));

  let html = `<div class="stats">收藏了 <b>${items.length}</b> 条创意</div>`;
  html += `<div class="cards" style="margin-top:10px">`;
  for (const item of items) {
    html += renderCard(item);
  }
  html += `</div>`;
  html += '<div class="bottom-space"></div>';
  app.innerHTML = html;
}

function renderCard(item) {
  const title = fixTitle(item.title || '');
  const sc = item.score || 2;
  const isBk = bookmarks.has(item.id);
  return `
    <div class="card-wrap">
      <a class="card ${scoreClass(sc)}" href="${escHtml(item.url||'#')}" target="_blank" rel="noopener" aria-label="${escHtml(title)}">
        <div class="card-top">
          <div class="source-row">
            <div class="dot ${dotClass(item.source)}"></div>
            <span class="src-name">${escHtml(item.sourceLabel||'')}</span>
            ${item.hnScore ? `<span class="hn-score">▲${item.hnScore}</span>` : ''}
            ${item.category ? `<span class="cat-tag">${escHtml(item.category)}</span>` : ''}
          </div>
          <div class="score-bar" role="img" aria-label="评分 ${sc}/5">${scoreDots(sc)}</div>
        </div>
        <div class="card-title">${escHtml(title)}</div>
        ${item.mrr ? `<div class="mrr">💰 ${escHtml(item.mrr)}</div>` : ''}
        ${item.summary ? `<p class="summary">${escHtml(item.summary)}</p>` : ''}
        ${item.opportunity ? `
          <div class="opp-box">
            <span class="opp-icon">🇨🇳</span>
            <span class="opp-text">${escHtml(item.opportunity)}</span>
          </div>` : ''}
        ${item.scoreReason ? `<p class="score-reason">${escHtml(item.scoreReason)}</p>` : ''}
      </a>
      <button class="bookmark-btn ${isBk ? 'bookmarked' : ''}"
        data-bk-id="${escHtml(item.id)}"
        onclick="toggleBookmark('${escHtml(item.id)}', event)"
        aria-label="${isBk ? '取消收藏' : '收藏'}">${isBk ? '🔖' : '🏷️'}</button>
    </div>`;
}

function renderView(grouped, total, totalPages) {
  const app = document.getElementById('app');
  const dates = Object.keys(grouped).sort((a,b) => b.localeCompare(a));

  const tabLabels = {feed:'精选（评分≥3）', all:'全部', ph:'PH 新品', tmrr:'验证收入', ih:'独立创业', hn:'HN 精选'};
  const hasFilter = searchQ || activeTab !== 'all';

  if (dates.length === 0) {
    if (hasFilter) {
      app.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <p>没有符合条件的创意</p>
          ${searchQ ? `<button class="empty-action" onclick="clearSearch()">清除搜索</button>` : ''}
        </div>`;
    } else {
      app.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📡</div>
          <p>暂无数据</p>
          <p class="empty-sub">数据将在下次 GitHub Actions 运行后自动更新</p>
        </div>`;
    }
    return;
  }

  const tH = document.getElementById('topbar').offsetHeight;
  const stickyTop = tH + 'px';

  let html = `<div class="stats">共 <b>${total}</b> 条${searchQ ? ` · 搜索「${escHtml(searchQ)}」` : ''}${activeTab==='feed' ? ' · 高价值精选' : ''}</div>`;

  for (const date of dates) {
    const items = grouped[date];
    html += `
      <div class="section-header" style="top:${stickyTop};position:sticky;z-index:10;background:rgba(10,10,15,0.92);backdrop-filter:blur(8px)">
        <span class="date-label">${fmtDate(date)}</span>
        <span class="date-count">· ${items.length} 条</span>
        <div class="date-line"></div>
      </div>
      <div class="cards">`;

    for (const item of items) {
      html += renderCard(item);
    }
    html += `</div>`;
  }

  if (totalPages > 1) {
    html += `
      <div class="pagination">
        <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>上一页</button>
        <span class="page-info">${currentPage} / ${totalPages}</span>
        <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>下一页</button>
      </div>`;
  }

  html += '<div class="bottom-space"></div>';
  html += '<div class="footer">Product Hunt · TrustMRR · IndieHackers · Hacker News<br>每天 08:00 CST 由 GitHub Actions 自动抓取</div>';
  app.innerHTML = html;
}

// ── 标签页切换 ──────────────────────────────────────────
function setTab(el, tab) {
  activeTab = tab;
  currentPage = 1;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  // 搜索框仅在非收藏页显示
  document.getElementById('searchWrap').style.display = tab === 'bookmarks' ? 'none' : '';
  filterAndRender();
}

// ── 交互 ──────────────────────────────────────────────
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  searchQ = ''; currentPage = 1;
  filterAndRender();
}

function goPage(p) {
  currentPage = p;
  filterAndRender();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('searchInput').addEventListener('input', function() {
  const v = this.value.trim();
  document.getElementById('searchClear').classList.toggle('visible', v.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = v; currentPage = 1;
    filterAndRender();
  }, 300);
});

// ── 启动 ──────────────────────────────────────────────
loadBookmarks();
updateBookmarkUI();
loadData();
</script>
</body>
</html>
